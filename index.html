<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Nihon Kohden Parts Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Password Screen -->
  <div id="passwordScreen">
    <div class="password-box">
      <img src="images/lapidot-logo.png" alt="Lapidot Group" class="password-logo" onerror="this.style.display='none'" />
      <div class="password-divider"></div>
      <h2>Nihon Kohden Parts Finder</h2>
      <p>Enter password to continue</p>
      <input type="password" id="passwordInput" placeholder="Password" />
      <button onclick="checkPassword()">Enter</button>
      <p id="passwordError" class="password-error"></p>
    </div>
  </div>

  <!-- Main App (hidden until password correct) -->
  <div class="shell" id="appContent" style="display:none;">

    <!-- Masthead with search -->
    <header class="masthead">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="logo" id="logoHome" title="Home">
        <img src="images/logo.png" alt="" class="logo-img" onerror="this.style.display='none'" />
        <span class="logo-mark">NK</span>
        <span class="logo-name">Nihon Kohden Catalog</span>
        <span class="logo-sub">Lapidot</span>
      </div>
      <div class="bigsearch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <input id="searchInput" type="text" placeholder="Search by part name, NK number, Lapidot number, or device…" autocomplete="off" />
        <span class="kbd">esc to clear</span>
      </div>
    </header>

    <!-- Workspace: sidebar + content -->
    <div class="workspace">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <main class="results" id="results"></main>
    </div>
  </div>

  <script>
    document.getElementById("passwordInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") checkPassword();
    });

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      if (input === "Lapidot2026") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("appContent").style.display = "";
        document.getElementById("searchInput").focus();
      } else {
        document.getElementById("passwordError").textContent = "Incorrect password. Try again.";
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").focus();
      }
    }
  </script>

  <script src="app.js"></script>
</body>
</html>
